<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/nes.css@latest/css/nes.min.css" rel="stylesheet" />

  <style>
    body {
      background-color: #212529;
      padding: 50px;
      font-family: "Press Start 2P", cursive;
    }

    /* Our Custom Notebook Wrapper */
    .notebook-container {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      align-items: flex-start; /* Keeps tabs aligned to the top */
    }

    /* The main page of the notebook */
    #notebook-page {
      flex-grow: 1;
      min-height: 300px;
      background-color: white; /* Default color */
      transition: background-color 0.2s;
    }

    /* The Tab Sidebar */
    .tabs {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-left: -4px; /* Slightly overlaps the notebook for a "tucked in" look */
    }

    /* Making it responsive: on mobile, tabs move to the top */
    @media (max-width: 600px) {
      .notebook-container {
        flex-direction: column-reverse;
      }
      .tabs {
        flex-direction: row;
        margin-left: 0;
        margin-bottom: -4px;
      }
    }
  </style>
</head>
<body>

<div class="notebook-container">
  
  <div id="notebook-page" class="nes-container is-rounded with-title">
    <p class="title">My Notebook</p>
    <p>Welcome, Traveler!</p>
    
    <a href="https://google.com" target="_blank" class="nes-btn is-primary">
      OPEN NEW PAGE
    </a>
  </div>

  <div class="tabs">
    <button type="button" class="nes-btn is-error" onclick="changeColor('#f7d1d1')">RED</button>
    <button type="button" class="nes-btn is-success" onclick="changeColor('#d1f7d1')">GRN</button>
    <button type="button" class="nes-btn is-warning" onclick="changeColor('#f7f1d1')">YLW</button>
  </div>

</div>

<script>
  // Simple logic to change the notebook color
  function changeColor(hex) {
    document.getElementById('notebook-page').style.backgroundColor = hex;
  }
</script>

</body>
</html>
